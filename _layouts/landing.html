---

<!doctype html>
<html lang="{{ site.alt_lang | default: site.lang }}" data-mode="dark">
  {% include head.html %}
  <body>
    <div style="
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: #000;
      font-family: 'Inter', -apple-system, sans-serif;
    ">
      <div style="
        font-size: 0.72rem;
        color: #333;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-bottom: 2rem;
      ">Tech Digest</div>

      <h1 style="
        font-size: clamp(3rem, 8vw, 5rem);
        font-weight: 700;
        line-height: 1.05;
        margin-bottom: 1.25rem;
        background: linear-gradient(135deg, #fff 0%, #444 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      ">Gyu Hwan</h1>

      <p style="
        font-size: 1.05rem;
        color: #555;
        line-height: 1.8;
        max-width: 480px;
        margin-bottom: 3rem;
      ">
        매일 기술 트렌드를 수집하고 AI로 큐레이션합니다.<br>
        코드 한 줄보다 <em style="color:#777;font-style:normal">왜 이 결정을 했는가</em>에 집중합니다.
      </p>

      <nav style="display:flex;gap:2.5rem">
        {% assign sorted_tabs = site.tabs | sort: 'order' %}
        {% for tab in sorted_tabs %}
          <a href="{{ tab.url | relative_url }}" style="
            color: #555;
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
            letter-spacing: 0.01em;
          " onmouseover="this.style.color='#ccc'" onmouseout="this.style.color='#555'">
            {{ tab.title }}
          </a>
        {% endfor %}
      </nav>
    </div>
  </body>
</html>
